# REDIS DEPLOYMENT (Low CPU, High Memory)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
          - redis-server
          - --maxmemory
          - "128gb"              # 128GB memory limit for Redis
          - --maxmemory-policy
          - allkeys-lru        # Evict old keys when memory full
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "1"          # Low CPU (500m cores)
            memory: "128Gi"       # High memory as requested
          limits:
            cpu: "1"            # Max 1 core
            memory: "128Gi"       # Hard limit 128GB
---
# REDIS SERVICE (for internal communication)
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
---
# SAM3 FASTAPI DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam3-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sam3
  template:
    metadata:
      labels:
        app: sam3
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product # kubernetes.io/hostname
                operator: In
                values:
                  - Tesla-V100-SXM2-32GB #k8s-a6000-01.csus.edu
      containers:
      - name: api
        image: brijeshnanda/annotation_assistor:v8-amd64
        ports:
        - containerPort: 2128
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: sam3-secrets
              key: HF_TOKEN
        - name: REDIS_HOST          # Linked to Redis service
          value: "redis-service"    # Service name resolves automatically
        - name: REDIS_PORT
          value: "6379"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
        resources:
          requests:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: sam3-service
spec:
  selector:
    app: sam3
  ports:
  - port: 80
    targetPort: 2128
  type: ClusterIP

---
# INGRESS for Public Access (NRP Specific)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sam3-ingress
  annotations:
    # Optional: increase timeout for model inference (default is usually 60s)
    # haproxy-ingress-proxy.timeout: "300s"
    # haproxy.router.openshift.io/timeout: "300s"
    haproxy-ingress.github.io/timeout-server: "300s"
    haproxy-ingress.github.io/timeout-connect: "300s"
spec:
  ingressClassName: haproxy  # NRP requires this specific class
  rules:
  - host: sam3-sailab.nrp-nautilus.io  # Change 'sailab' to your namespace
    http:
      paths:
      - backend:
          service:
            name: sam3-service
            port:
              number: 80
        path: /
        pathType: ImplementationSpecific
  tls:
  - hosts:
    - sam3-sailab.nrp-nautilus.io  # Must match the host above

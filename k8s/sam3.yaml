# SAM3 FASTAPI DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam3-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sam3
  template:
    metadata:
      labels:
        app: sam3
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                  - NVIDIA-A10 #Tesla-V100-SXM2-32GB
      containers:
      - name: api
        image: ghcr.io/icicle-ai/sam3-inference-service:latest
        ports:
        - containerPort: 2128
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: sam3-secrets
              key: HF_TOKEN
        - name: REDIS_HOST
          value: "redis-service"   # Resolves via Kubernetes DNS to the Redis ClusterIP
        - name: REDIS_PORT
          value: "6379"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
        resources:
          requests:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
---
# SAM3 SERVICE (internal ClusterIP — fronted by the Ingress on port 80)
apiVersion: v1
kind: Service
metadata:
  name: sam3-service
spec:
  selector:
    app: sam3
  ports:
  - port: 80
    targetPort: 2128
  type: ClusterIP

# REDIS DEPLOYMENT (Low CPU, High Memory)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
          - redis-server
          - --maxmemory
          - "48gb"
          - --maxmemory-policy
          - allkeys-lru
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "1"
            memory: "48Gi"
          limits:
            cpu: "1"
            memory: "48Gi"
---
# REDIS SERVICE (internal ClusterIP — reachable as "redis-service" within the namespace)
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
